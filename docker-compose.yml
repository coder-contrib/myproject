services:
  # --- Application ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ceramix}:${POSTGRES_PASSWORD:-ceramix_secret}@postgres:5432/${POSTGRES_DB:-ceramix_erp}
      - REDIS_URL=redis://redis:6379/0
      - AI_API_BASE_URL=${AI_API_BASE_URL:-https://api.openai.com/v1}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_CHAT_MODEL=${AI_CHAT_MODEL:-gpt-4o}
      - AI_EMBEDDING_MODEL=${AI_EMBEDDING_MODEL:-text-embedding-3-small}
      - FILE_STORAGE_PROVIDER=${FILE_STORAGE_PROVIDER:-local}
      - FILE_LOCAL_PATH=/app/uploads
      - FILE_S3_ENDPOINT=${FILE_S3_ENDPOINT:-}
      - FILE_S3_ACCESS_KEY=${FILE_S3_ACCESS_KEY:-}
      - FILE_S3_SECRET_KEY=${FILE_S3_SECRET_KEY:-}
      - FILE_S3_BUCKET=${FILE_S3_BUCKET:-erp-files}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - METRICS_ENABLED=true
      - SHOW_DOCS=${SHOW_DOCS:-true}
    volumes:
      - uploads_data:/app/uploads
      - exports_data:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  # --- Celery Worker ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.jobs.celery_app worker --loglevel=info --concurrency=4 -Q default,email,notifications,ai,reports,webhooks
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ceramix}:${POSTGRES_PASSWORD:-ceramix_secret}@postgres:5432/${POSTGRES_DB:-ceramix_erp}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - AI_API_KEY=${AI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  # --- Celery Beat (Scheduler) ---
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.jobs.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ceramix}:${POSTGRES_PASSWORD:-ceramix_secret}@postgres:5432/${POSTGRES_DB:-ceramix_erp}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  # --- PostgreSQL ---
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ceramix}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ceramix_secret}
      - POSTGRES_DB=${POSTGRES_DB:-ceramix_erp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ceramix}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./devops/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app_network

  # --- Grafana ---
  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./devops/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  exports_data:
  prometheus_data:
  grafana_data:

networks:
  app_network:
    driver: bridge
